name: traffic2badge
on:
 push:
   branches:
     - main
 schedule:
   - cron: '1 0 * * *' # Läuft automatisch jede Nacht um 01:00 Uhr

jobs:
 run:
   name: Make GitHub Traffic to Badge
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Code
       uses: actions/checkout@v3

     - name: Set Traffic
       uses: yi-Xu-0100/traffic-to-badge@v1.4.0
       with:
         my_token: ${{ secrets.TRAFFIC_TOKEN }}
         static_list: ZahlenRatenSpiel-Java

